<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Detail Pro</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

</head>

<body>

<div class="container">

<header>

<h1>Detail Pro</h1>

<p>
Checklist Premium de Higienização
</p>

</header>

<div class="card">

<h2>Informações do Veículo</h2>

<div class="grid">

<input
id="marca"
type="text"
placeholder="Marca">

<input
id="modelo"
type="text"
placeholder="Modelo">

<input
id="placa"
type="text"
placeholder="Placa">

<input
id="cor"
type="text"
placeholder="Cor">

<input
id="responsavel"
type="text"
placeholder="Responsável">

</div>

</div>

<div class="card">

<h2>Checklist Interno</h2>

<div class="checklist">

<label>
<input class="check" type="checkbox">
Bancos
</label>

<label>
<input class="check" type="checkbox">
Portas
</label>

<label>
<input class="check" type="checkbox">
Teto
</label>

<label>
<input class="check" type="checkbox">
Painel
</label>

<label>
<input class="check" type="checkbox">
Porta-copos
</label>

<label>
<input class="check" type="checkbox">
Encosto de braço
</label>

<label>
<input class="check" type="checkbox">
Colunas
</label>

<label>
<input class="check" type="checkbox">
Porta-malas
</label>

<label>
<input class="check" type="checkbox">
Carpete
</label>

<label>
<input class="check" type="checkbox">
Saída ar-condicionado
</label>

<label>
<input class="check" type="checkbox">
Trilho bancos
</label>

</div>

</div>

<div class="card">

<h2>Observações</h2>

<textarea
id="obs"
placeholder="Digite observações do veículo..."></textarea>

</div>
<div class="card">

<h2>Fotos do Veículo</h2>

<div class="upload-area">

<label class="upload-btn">

Selecionar Fotos

<input
id="fotos"
type="file"
accept="image/*"
multiple
hidden>

</label>

<p>
Adicione fotos antes/depois
</p>

<div id="preview"></div>

</div>

</div>
<button
type="button"
onclick="gerarPDF()">

Gerar PDF

</button>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script src="app.js"></script>

</body>

</html>
