<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Suvira Detail</title>

<style>

body{
    background:#020617;
    color:white;
    font-family:Arial;
    padding:20px;
}

button{
    background:#06b6d4;
    color:white;
    border:none;
    padding:16px 24px;
    border-radius:12px;
    font-size:18px;
    cursor:pointer;
}

</style>

</head>

<body>

<h1>Detail Pro</h1>

<button onclick="gerarPDF()">
    Gerar PDF
</button>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script>

function gerarPDF(){

    const { jsPDF } = window.jspdf;

    const doc = new jsPDF();

    doc.text(
        "PDF funcionando!",
        20,
        20
    );

    doc.save("teste.pdf");

}

</script>

</body>

</html>
